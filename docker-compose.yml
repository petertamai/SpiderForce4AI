version: '3.8'

services:
  spiderforce4ai:
    image: petertamai/spiderforce4ai:latest
    # Or build from local Dockerfile:
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    container_name: spiderforce4ai
    restart: unless-stopped
    ports:
      - "3004:3004"
    environment:
      - NODE_ENV=production
      - PORT=3004
      - USE_REDIS=internal # Can be 'internal', 'external', or 'none'
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Optional: uncomment to use external Redis
      # - USE_REDIS=external
      # - EXTERNAL_REDIS_URL=redis://default:password@your-redis-host:6379
    volumes:
      - ./logs:/usr/src/app/logs
      - ./crawl_reports:/usr/src/app/crawl_reports
    depends_on:
      redis:
        condition: service_healthy  # Wait for Redis to be healthy
    networks:
      - spiderforce_network

  redis:
    image: redis:7-alpine
    container_name: spiderforce_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]  # Check if Redis responds to ping
      interval: 5s                        # Check every 5 seconds
      timeout: 3s                         # Timeout after 3 seconds
      retries: 5                          # Retry 5 times before failing
      start_period: 10s                   # Give Redis 10s to start initially
    networks:
      - spiderforce_network

networks:
  spiderforce_network:
    driver: bridge

volumes:
  redis_data: